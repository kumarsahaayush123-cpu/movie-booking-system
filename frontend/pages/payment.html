<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<link rel="stylesheet" href="../css/payment.css">

</head>

<body>

<div class="container">

<h1>🎬 Payment Gateway</h1>

<div class="summary">

<h2>Booking Summary</h2>

<p><strong>Movie:</strong> <span id="movie"></span></p>

<p><strong>Seats:</strong> <span id="seatList"></span></p>

<p><strong>Total:</strong> ₹<span id="amount"></span></p>

</div>

<div class="payment">

<h2>Select Payment Method</h2>

<label>
<input type="radio" name="pay" value="UPI" checked>
UPI
</label>

<label>
<input type="radio" name="pay" value="Card">
Credit / Debit Card
</label>

<label>
<input type="radio" name="pay" value="Net Banking">
Net Banking
</label>

<label>
<input type="radio" name="pay" value="Cash">
Pay at Theatre
</label>

<button id="payBtn">

Proceed to Payment

</button>

</div>

</div>

<script src="../js/payment.js"></script>

</body>
</html>
