<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Ticket</title>

<link rel="stylesheet" href="../css/ticket.css">

</head>
<body>

<div class="ticket">

<div class="header">

<h1>🎬 Movie Ticket</h1>

</div>

<div class="content">

<p><strong>Booking ID :</strong> <span id="bookingId"></span></p>

<p><strong>Movie :</strong> <span id="movie"></span></p>

<p><strong>Seats :</strong> <span id="seat"></span></p>

<p><strong>Total :</strong> ₹<span id="price"></span></p>

<p><strong>Payment :</strong> <span id="payment"></span></p>

<p><strong>Date :</strong> <span id="date"></span></p>

</div>

<div class="barcode">

|||||||||||||||||||||||||||||||||||||||||

</div>

<button id="download">

Download Ticket

</button>

</div>

<script src="../js/ticket.js"></script>

</body>
</html>
