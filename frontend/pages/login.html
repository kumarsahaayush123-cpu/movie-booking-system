<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="../css/login.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>🎬 Movie Booking</h1>

<p>Book your favourite movies with just one click.</p>

</div>

<div class="right">

<h2>Welcome Back</h2>

<form id="loginForm">

<input
type="text"
id="username"
placeholder="Username"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<p>

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</div>

</div>

<script src="../js/login.js"></script>

</body>

</html>
